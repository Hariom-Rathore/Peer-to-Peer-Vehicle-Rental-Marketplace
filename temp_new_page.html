    <div class="container">
        

    <body>
        <h2>Create a New Listing</h2>
        <form method="POST" action="/listings" novalidate class="needs-validataion">


            <div class="row">
                <div class="col-8 offset-2">
                    <div>
                        <label for="title" class="form-label">Title</label>
                        <input name="listing[title]" placeholder="Add a catchy title" type="text" class="form-control"  required>
                       
                    </div>

                    <div>
                        <label for="description" class="form-label">description</label>
                        <input name="listing[description]" placeholder="enter description" type="text"
                            class="form-control"  required>
                           
                    </div>

                    <div>
                        <label for="image" class="form-label">image</label>
                        <input name="listing[image][url]" placeholder="image url" type="text" class="form-control"  required>
                    
                    </div>
                    <div class="row">
                        <div class=" mb-3 col-md-4">
                            <label for="price" class="form-label">price</label>
                            <input name="listing[price]" placeholder="enter price" type="number" class="form-control"  required>
                       
                     </div>


                        <div class="mb-3 col-md-8">
                            <label for="country" class="form-label">country</label>
                            <input name="listing[country]" placeholder="India" type="text" class="form-control"  required>

                           
                    </div>

                    <div>
                        <label for="location" class="form-label">location</label>
                        <input name="listing[location]" placeholder="enter location" type="text" class="form-control"  required>
                 
                    </div>
                    <br>

                    <button class="btn btn-dark">Add</button>
        </form>

        </div>
        </div>
        <Br>
    </body>
