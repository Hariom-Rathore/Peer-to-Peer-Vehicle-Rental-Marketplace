    <style>
  .btn-search{
    background-color: #fe424d;
    color: #fff;
    border-radius: 25px;
    padding: 0 1rem 0 1 rem;
  }
  .btn-search:hover{
    background-color: #fe424d;
    color: #fff;
    
  }

  .btn-search i{
    display:inline ;
    margin:0.5rem ;
  }

  .search-input {
    border-radius: 25px;
    text-align: left;
    padding-left: 1rem;
    padding-right: 1rem;
  }

  .search-input::placeholder {
    text-align: left;
  }

  /* Mobile Responsive Search */
  @media (max-width: 575.98px) {
    .d-flex.role-search {
      flex-direction: column !important;
      width: 100%;
    }

    .search-input {
      font-size: 0.85rem;
      padding-left: 0.75rem;
      padding-right: 0.75rem;
      margin-right: 0.5rem !important;
      margin-bottom: 0.5rem;
    }

    .btn-search {
      font-size: 0.85rem;
      padding: 0.35rem 0.75rem !important;
      width: 100%;
    }

    .btn-search i {
      margin: 0.25rem !important;
    }

    .navbar-brand {
      margin-right: 0.5rem !important;
    }

    .nav-link {
      font-size: 0.9rem;
      padding: 0.4rem 0.5rem !important;
    }
  }

  @media (min-width: 576px) and (max-width: 767.98px) {
    .search-input {
      font-size: 0.9rem;
      max-width: 150px;
    }

    .btn-search {
      font-size: 0.9rem;
    }
  }

  @media (min-width: 768px) and (max-width: 991.98px) {
    .search-input {
      max-width: 200px;
    }
  }
</style>
